const sb = (typeof supabase !== 'undefined' && SUPABASE_URL !== 'REPLACE_WITH_YOUR_SUPABASE_URL')
  ? supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

// Helper: run supabase query or return mock fallback
async function sbQuery(queryFn, fallback) {
  if (!sb) return { data: fallback, error: null };
  try { return await queryFn(sb); }
  catch(e) { console.warn('Supabase query failed, using mock data', e); return { data: fallback, error: e }; }
}

const Badge=({children,color="blue"})=>{
  const c={blue:"bg-blue-100 text-blue-800",green:"bg-green-100 text-green-800",yellow:"bg-yellow-100 text-yellow-800",red:"bg-red-100 text-red-800",purple:"bg-purple-100 text-purple-800",gray:"bg-gray-100 text-gray-800",orange:"bg-orange-100 text-orange-800",cyan:"bg-cyan-100 text-cyan-800"};
  return <span className={`px-2.5 py-1 rounded-full text-xs font-semibold ${c[color]}`}>{children}</span>;
};

const StatCard=({icon,label,value,sub,color="blue",trend})=>{
  const bgMap={blue:"bg-blue-50",green:"bg-green-50",yellow:"bg-yellow-50",red:"bg-red-50",purple:"bg-purple-50",orange:"bg-orange-50",cyan:"bg-cyan-50"};
  const txtMap={blue:"text-blue-600",green:"text-green-600",yellow:"text-yellow-600",red:"text-red-600",purple:"text-purple-600",orange:"text-orange-600",cyan:"text-cyan-600"};
  return(
    <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-5 hover:shadow-md transition-shadow">
      <div className="flex items-center justify-between">
        <div className={`p-3 rounded-xl ${bgMap[color]}`}><I name={icon} className={txtMap[color]} size={22}/></div>
        {trend&&<span className={`text-xs font-semibold flex items-center gap-1 ${trend>0?"text-green-600":"text-red-600"}`}><I name="trend" size={12}/>{Math.abs(trend)}%</span>}
      </div>
      <div className="mt-4"><p className="text-2xl font-bold text-gray-900">{value}</p><p className="text-sm text-gray-500 mt-1">{label}</p>{sub&&<p className="text-xs text-gray-400 mt-1">{sub}</p>}</div>
    </div>
  );
};

const ProgressBar=({value,color="blue",size="md"})=>{
  const cMap={blue:"bg-blue-500",green:"bg-green-500",yellow:"bg-yellow-500",red:"bg-red-500",purple:"bg-purple-500"};
  return <div className={`w-full bg-gray-100 rounded-full ${size==="sm"?"h-1.5":"h-2.5"}`}><div className={`h-full rounded-full ${cMap[color]} transition-all duration-500`} style={{width:`${value}%`}}/></div>;
};

const Modal=({isOpen,onClose,title,children})=>{
  if(!isOpen)return null;
  return(
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4" onClick={onClose}>
      <div className="fixed inset-0 modal-backdrop"/>
      <div className="relative bg-white rounded-2xl shadow-2xl w-full max-w-3xl max-h-[85vh] overflow-y-auto fade-in" onClick={e=>e.stopPropagation()}>
        <div className="sticky top-0 bg-white flex items-center justify-between p-5 border-b border-gray-100 rounded-t-2xl z-10">
          <h3 className="text-lg font-bold text-gray-900">{title}</h3>
          <button onClick={onClose} className="p-2 hover:bg-gray-100 rounded-lg"><I name="x" size={18}/></button>
        </div>
        <div className="p-6">{children}</div>
      </div>
    </div>
  );
};

const SearchBar=({value,onChange,placeholder})=>(
  <div className="relative">
    <I name="search" className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" size={16}/>
    <input type="text" value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder||"Search..."}
      className="w-full pl-10 pr-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"/>
  </div>
);

const TabNav=({tabs,active,onChange})=>(
  <div className="flex gap-1 bg-gray-100 p-1 rounded-xl">
    {tabs.map(t=><button key={t.id} onClick={()=>onChange(t.id)} className={`px-4 py-2 rounded-lg text-sm font-medium transition-all ${active===t.id?"bg-white text-blue-700 shadow-sm":"text-gray-600 hover:text-gray-900"}`}>{t.label}</button>)}
  </div>
);

const DataTable=({columns,data,onRowClick})=>(
  <div className="overflow-x-auto">
    <table className="w-full">
      <thead><tr className="border-b border-gray-200">{columns.map((c,i)=><th key={i} className="text-left py-3 px-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">{c.header}</th>)}</tr></thead>
      <tbody>{data.map((r,i)=><tr key={i} className={`border-b border-gray-50 hover:bg-gray-50 transition-colors ${onRowClick?"cursor-pointer":""}`} onClick={()=>onRowClick?.(r)}>
        {columns.map((c,j)=><td key={j} className="py-3 px-4 text-sm text-gray-700">{c.render?c.render(r):r[c.key]}</td>)}
      </tr>)}</tbody>
    </table>
  </div>
);

const Avatar=({name,size="9"})=>{
  const initials=name.split(" ").map(n=>n[0]).join("");
  return <div className={`w-${size} h-${size} rounded-full bg-blue-100 flex items-center justify-center text-blue-700 font-bold text-sm`}>{initials}</div>;
};

// 1. PLACEMENTS
const PlacementModule=()=>{
  const [search,setSearch]=useState("");
  const [filterStatus,setFilterStatus]=useState("All");
  const [selected,setSelected]=useState(null);
  const statuses=["All","Active","Completed","Dropped"];
  const filtered=LEARNERS.filter(l=>(filterStatus==="All"||l.status===filterStatus)&&(l.name.toLowerCase().includes(search.toLowerCase())||l.industry.toLowerCase().includes(search.toLowerCase())));

  return(
    <div className="fade-in">
      <div className="flex items-center justify-between mb-6">
        <div><h2 className="text-xl font-bold text-gray-900">Learner Placement Management</h2><p className="text-sm text-gray-500 mt-1">Track and manage all internship placements</p></div>
        <button className="flex items-center gap-2 px-4 py-2.5 bg-blue-600 text-white rounded-xl text-sm font-medium hover:bg-blue-700"><I name="plus" size={16}/> New Placement</button>
      </div>
      <div className="flex flex-wrap gap-3 mb-6">
        <div className="flex-1 min-w-[200px]"><SearchBar value={search} onChange={setSearch} placeholder="Search learner or industry..."/></div>
        <select value={filterStatus} onChange={e=>setFilterStatus(e.target.value)} className="px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">{statuses.map(s=><option key={s}>{s}</option>)}</select>
        <button className="flex items-center gap-2 px-4 py-2.5 border border-gray-200 rounded-xl text-sm text-gray-600 hover:bg-gray-50"><I name="download" size={16}/> Export</button>
      </div>
      <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
        <StatCard icon="users" label="Total Learners" value={LEARNERS.length} color="blue"/>
        <StatCard icon="check" label="Active" value={LEARNERS.filter(l=>l.status==="Active").length} color="green"/>
        <StatCard icon="award" label="Completed" value={LEARNERS.filter(l=>l.status==="Completed").length} color="purple"/>
        <StatCard icon="warn" label="Dropouts" value={LEARNERS.filter(l=>l.status==="Dropped").length} color="red"/>
      </div>
      <div className="bg-white rounded-xl border border-gray-200">
        <DataTable columns={[
          {header:"Learner",render:r=><div className="flex items-center gap-3"><Avatar name={r.name}/><div><p className="font-medium text-gray-900">{r.name}</p><p className="text-xs text-gray-400">{r.qualification}</p></div></div>},
          {header:"Industry",key:"industry"},
          {header:"Region",key:"region"},
          {header:"Progress",render:r=><div className="w-28"><div className="flex justify-between text-xs mb-1"><span>{r.progress}%</span></div><ProgressBar value={r.progress} color={r.progress>75?"green":r.progress>50?"yellow":"red"} size="sm"/></div>},
          {header:"Status",render:r=><Badge color={r.status==="Active"?"green":r.status==="Completed"?"blue":"red"}>{r.status}</Badge>},
          {header:"",render:r=><button onClick={e=>{e.stopPropagation();setSelected(r);}} className="p-1.5 hover:bg-gray-100 rounded-lg"><I name="eye" size={16} className="text-gray-400"/></button>},
        ]} data={filtered} onRowClick={setSelected}/>

      if(error){setError(error.message);setLoading(false);return;}
      const {data:profile}=await sb.from('profiles').select('*').eq('id',data.user.id).single();
      if(profile){onLogin({email:profile.email,name:profile.name,role:profile.role,initials:profile.initials||profile.name.substring(0,2).toUpperCase(),id:profile.id});}
      else{setError("Profile not found. Contact admin.");setLoading(false);}

      if(user){onLogin(user);}
      else{setError("Invalid credentials. Use a demo account below.");setLoading(false);}

                    onMouseOver={e=>e.currentTarget.style.background="#eff6ff"}
                    onMouseOut={e=>e.currentTarget.style.background="none"}>
                    <div style={{width:"36px",height:"36px",background:"#dbeafe",borderRadius:"10px",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                      <span style={{fontSize:"11px",fontWeight:"800",color:"#1d4ed8"}}>{u.initials}</span>
                    </div>
                    <div style={{flex:1,minWidth:0}}>
                      <p style={{fontSize:"13px",fontWeight:"700",color:"#1f2937",marginBottom:"1px"}}>{u.name}</p>
                      <p style={{fontSize:"11px",color:"#9ca3af",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{u.email}</p>
                    </div>
                    <span style={{fontSize:"11px",background:"#f3f4f6",color:"#6b7280",padding:"3px 8px",borderRadius:"20px",flexShrink:0,textTransform:"capitalize"}}>{u.role}</span>
                  </button>
                ))}
              </div>
            )}
          </div>

          <p style={{textAlign:"center",fontSize:"11px",color:"#d1d5db",marginTop:"28px"}}>ILO · UNESCO-UNEVOC · COTVET Aligned · © 2026</p>
        </div>
      </div>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
    </div>
  );
}

function App(){
  const [user,setUser]=useState(null);
  const [role,setRole]=useState(null);
  const [mod,setMod]=useState("dashboard");
  const [sidebarOpen,setSidebarOpen]=useState(true);

  const handleLogin=(u)=>{setUser(u);setRole(u.role);setMod(u.role==="learner"?"profile":"dashboard");};
  const handleLogout=async()=>{if(sb)await sb.auth.signOut();setUser(null);setRole(null);setMod("dashboard");};

  if(!user){return <LoginScreen onLogin={handleLogin}/>;}

  if(!role){
    return(
      <div className="min-h-screen bg-gradient-to-br from-blue-50 via-white to-green-50 flex items-center justify-center p-4 sm:p-8">
        <div className="max-w-4xl w-full">
          <div className="text-center mb-10">
            <div className="inline-flex items-center justify-center w-16 h-16 bg-blue-600 rounded-2xl shadow-lg shadow-blue-200 mb-4"><I name="grad" className="text-white" size={36}/></div>
            <h1 className="text-3xl sm:text-4xl font-black text-gray-900">DTI WEL System</h1>
            <p className="text-gray-500 mt-2 text-lg">Workplace Experience Learning Platform</p>
            <p className="text-sm text-gray-400 mt-1">Design & Technology Institute</p>
          </div>
          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
            {ROLES.map(r=>(
              <button key={r.id} onClick={()=>{setRole(r.id);setMod("dashboard");}} className="bg-white rounded-2xl border-2 border-gray-100 p-6 hover:border-blue-300 hover:shadow-xl transition-all text-left group">
                <div className={`p-3 ${r.bg} rounded-xl w-fit mb-4 group-hover:scale-110 transition-transform`}><I name={r.icon} className={r.tx} size={28}/></div>
                <h3 className="font-bold text-gray-900 text-lg">{r.label}</h3>
                <p className="text-sm text-gray-400 mt-1">{r.desc}</p>
              </button>
            ))}
          </div>
          <p className="text-center text-xs text-gray-300 mt-8">ILO &middot; UNESCO-UNEVOC &middot; COTVET Aligned</p>
        </div>
      </div>
    );
  }

  const nav=NAV[role]||NAV.admin;
  const cur=ROLES.find(r=>r.id===role);
  const renderModule=()=>{
    switch(mod){
      case"profile":return <LearnerProfileModule user={user}/>;
      case"dashboard":return <Dashboard/>;case"placements":return <PlacementModule/>;case"surveys":return <SurveyModule/>;
      case"brochure":return <BrochureModule/>;case"notifications":return <NotificationsModule/>;case"reporting":return <ReportingModule/>;
      case"logbook":return <LogbookModule/>;case"industry":return <IndustryModule/>;case"cv":return <CVModule/>;
      case"issues":return <IssuesModule/>;case"employment":return <EmploymentModule/>;case"alumni":return <AlumniModule/>;
      case"compliance":return <ComplianceModule/>;case"mentors":return <MentorModule/>;
      default:return <Dashboard/>;
    }
  };

  return(
    <div className="min-h-screen bg-gray-50 flex">
      {/* Sidebar */}
      <div className={`${sidebarOpen?"w-60":"w-16"} bg-white border-r border-gray-200 flex flex-col transition-all duration-300 shrink-0 fixed h-full z-40 lg:relative`}>
        <div className="p-3 border-b border-gray-100">
          <div className="flex items-center gap-2">
            <div className="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shrink-0"><I name="grad" className="text-white" size={22}/></div>
            {sidebarOpen&&<div><p className="font-bold text-gray-900 text-sm">DTI WEL</p><p className="text-xs text-gray-400">{cur?.label}</p></div>}
          </div>
        </div>
        <nav className="flex-1 p-2 space-y-0.5 overflow-y-auto sidebar-scroll">
          {nav.map(item=>(
            <button key={item.id} onClick={()=>setMod(item.id)} className={`w-full flex items-center gap-2.5 px-3 py-2.5 rounded-xl text-sm transition-all ${mod===item.id?"bg-blue-50 text-blue-700 font-semibold":"text-gray-600 hover:bg-gray-50"}`}>
              <I name={item.icon} className={mod===item.id?"text-blue-600":"text-gray-400"} size={18}/>{sidebarOpen&&<span>{item.label}</span>}
            </button>
          ))}
        </nav>
        <div className="p-2 border-t border-gray-100 space-y-0.5">
          <button onClick={()=>setSidebarOpen(!sidebarOpen)} className="w-full flex items-center gap-2.5 px-3 py-2.5 rounded-xl text-sm text-gray-600 hover:bg-gray-50"><I name="menu" className="text-gray-400" size={18}/>{sidebarOpen&&<span>Toggle</span>}</button>
          <button onClick={handleLogout} className="w-full flex items-center gap-2.5 px-3 py-2.5 rounded-xl text-sm text-gray-600 hover:bg-gray-50"><I name="logout" className="text-gray-400" size={18}/>{sidebarOpen&&<span>Sign Out</span>}</button>
        </div>
      </div>

      {/* Main */}
      <div className={`flex-1 flex flex-col min-w-0 ${sidebarOpen?"lg:ml-0 ml-60":""}`}>
        <header className="bg-white border-b border-gray-200 px-4 sm:px-6 py-3 flex items-center justify-between shrink-0">
          <div className="relative w-48 sm:w-72"><I name="search" className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" size={16}/><input placeholder="Search..." className="w-full pl-10 pr-4 py-2 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/></div>
          <div className="flex items-center gap-3">
            <button className="relative p-2 hover:bg-gray-100 rounded-xl"><I name="bell" className="text-gray-500" size={20}/><span className="absolute top-1 right-1 w-2.5 h-2.5 bg-red-500 rounded-full border-2 border-white"/></button>
            <div className="flex items-center gap-2 pl-3 border-l border-gray-200"><div className="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-white text-sm font-bold">{user?.initials||"U"}</div><span className="text-sm font-medium text-gray-700 hidden sm:inline">{user?.name||"User"}</span></div>
          </div>
        </header>
        <main className="flex-1 p-4 sm:p-6 overflow-y-auto">{renderModule()}</main>
        <footer className="bg-white border-t border-gray-200 px-6 py-2 text-center shrink-0"><p className="text-xs text-gray-400">DTI WEL System &middot; ILO &middot; UNESCO-UNEVOC &middot; COTVET &middot; &copy; 2026</p></footer>
      </div>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
</script>
</body>
</html>
